services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: incidentpilot
      POSTGRES_USER: incidentpilot
      POSTGRES_PASSWORD: incidentpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incidentpilot -d incidentpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  init-db:
    build: .
    command: ["python", "-m", "app.db.init"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://incidentpilot:incidentpilot@db:5432/incidentpilot
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    build: .
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://incidentpilot:incidentpilot@db:5432/incidentpilot
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      init-db:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=INFO"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://incidentpilot:incidentpilot@db:5432/incidentpilot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      init-db:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
