services:
  init-db:
    volumes:
      - ./app:/app/app

  backend:
    command:
      [
        "/bin/sh",
        "-c",
        "exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app",
      ]
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./app:/app/app

  worker:
    command:
      [
        "watchfiles",
        "--filter",
        "python",
        "celery -A app.worker.celery_app worker --loglevel=INFO --pool=solo",
        "/app/app",
      ]
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./app:/app/app
